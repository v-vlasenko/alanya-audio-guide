<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Аудіогіди Аланії</title>
  <meta name="description" content="Офлайн аудіогіди Аланії українською">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c75b39">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Аудіогіди по Аланії для мами і сестрички">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <script>
    if (location.protocol === 'file:') {
      document.body.innerHTML = '<main style="max-width:480px;margin:2rem auto;padding:0 1rem;font:18px/1.5 sans-serif"><h1>Потрібен локальний сервер</h1><p>Після переходу на ES-модулі файл <code>index.html</code> не працює подвійним кліком. Запустіть у папці проєкту:</p><pre style="background:#eee;padding:12px;border-radius:8px">python3 -m http.server 8000</pre><p>Потім відкрийте <a href="http://localhost:8000">http://localhost:8000</a></p></main>';
    }
  </script>
  <!-- in-app-browser (Telegram/WhatsApp) -> open in Safari warning -->
  <div id="webview-warn" class="webview-warn" hidden></div>

  <!-- screens are rendered into #app by app.js -->
  <main id="app" aria-live="polite"></main>

  <script src="lib/leaflet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
